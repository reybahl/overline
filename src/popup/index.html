<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patch</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>Patch</h1>
    </header>

    <label class="intent-field" for="intent-input">
      <span class="intent-label">Intent</span>
      <input
        id="intent-input"
        type="text"
        class="intent-input"
        placeholder="e.g. Go to Files changed"
      />
    </label>

    <label class="intent-field" for="macro-select">
      <span class="intent-label">Macro to run</span>
      <select id="macro-select" class="intent-input"></select>
    </label>

    <div class="actions">
      <button id="record-btn" type="button" class="btn btn-primary">
        Record macro
      </button>
      <button id="run-btn" type="button" class="btn btn-secondary">
        Run macro
      </button>
      <button id="capture-btn" type="button" class="btn btn-secondary">
        Capture DOM
      </button>
      <button id="generate-btn" type="button" class="btn btn-secondary">
        Generate Macro
      </button>
    </div>

    <p id="hint" class="hint">
      Open a regular website, then click the Patch icon to grant access.
    </p>
    <p id="status" class="status" role="status" aria-live="polite"></p>

    <section id="review-panel" class="review-panel" hidden>
      <h2 class="review-title">Does this look right?</h2>
      <p id="review-summary" class="review-summary"></p>
      <ol id="review-steps" class="review-steps"></ol>
      <div class="review-actions">
        <button id="confirm-save-btn" type="button" class="btn btn-primary">
          Save macro
        </button>
        <button id="discard-btn" type="button" class="btn btn-secondary">
          Discard
        </button>
      </div>
    </section>

    <pre id="capture-output" class="capture-output" hidden></pre>

    <footer class="footer">
      <a id="options-link" href="#">Manage macros</a>
    </footer>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
