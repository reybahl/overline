<!doctype html>
<html lang="en" class="ui-run-macro-page">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Run macro</title>
  </head>
  <body>
    <div class="ui-param-prompt ui-param-prompt--inline">
      <form id="run-macro-form" class="ui-param-prompt__form">
        <h2 id="run-macro-title" class="ui-param-prompt__title"></h2>
        <div id="run-macro-fields" class="ui-param-prompt__fields"></div>
        <p id="run-macro-error" class="ui-param-prompt__error" hidden></p>
        <div class="ui-param-prompt__actions">
          <button id="run-macro-cancel" type="button" class="ui-btn">Cancel</button>
          <button type="submit" class="ui-btn ui-btn--primary">Run</button>

      </form>
    </div>
    <script type="module" src="./run-macro.ts"></script>
  </body>
</html>
