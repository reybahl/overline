<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patch</title>
    <link rel="stylesheet" href="./window.css" />
  </head>
  <body>
    <main class="patch-shell">
      <header class="patch-header">
        <h1 class="patch-header__title">Patch</h1>
      </header>

      <label class="patch-field" for="intent-input">
        <span class="patch-label">Intent</span>
        <input
          id="intent-input"
          type="text"
          class="patch-input"
          placeholder="Go to Files changed"
        />
      </label>

      <label class="patch-field" for="macro-select">
        <span class="patch-label">Macro</span>
        <select id="macro-select" class="patch-input"></select>
      </label>

      <div class="patch-stack patch-stack--actions">
        <button id="record-btn" type="button" class="patch-btn patch-btn--primary">
          Record
        </button>
        <button id="run-btn" type="button" class="patch-btn">Run</button>
        <button id="capture-btn" type="button" class="patch-btn">Capture DOM</button>
        <button id="generate-btn" type="button" class="patch-btn">Generate</button>
        <button id="cancel-record-btn" type="button" class="patch-btn" hidden>
          Cancel recording
        </button>
      </div>

      <p id="status" class="patch-status" role="status" aria-live="polite"></p>

      <section id="review-panel" class="patch-section" hidden>
        <h2 class="patch-section__title">Review</h2>
        <p id="review-summary" class="patch-text-muted"></p>
        <ol id="review-steps" class="patch-list"></ol>
        <pre id="review-script-json" class="patch-code" hidden></pre>
        <div class="patch-row">
          <button id="confirm-save-btn" type="button" class="patch-btn patch-btn--primary">
            Save
          </button>
          <button id="discard-btn" type="button" class="patch-btn">Discard</button>
        </div>
      </section>

      <pre id="capture-output" class="patch-code" hidden></pre>

      <footer class="patch-footer">
        <button type="button" id="options-link" class="patch-btn patch-btn--ghost">
          Manage macros
        </button>
      </footer>
    </main>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
