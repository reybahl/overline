<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patch</title>
  </head>
  <body>
    <main class="patch-shell patch-shell--palette">
      <div id="palette-panel" class="patch-palette">
        <div class="patch-palette__search-wrap">
          <input
            id="search-input"
            type="search"
            class="patch-palette__search"
            placeholder="Search macros…"
            autocomplete="off"
            spellcheck="false"
            aria-controls="macro-list"
            aria-autocomplete="list"
          />
        </div>

        <div class="patch-palette__list-wrap">
          <ul id="macro-list" class="patch-palette__list" role="listbox" aria-label="Macros"></ul>
          <p id="macro-empty" class="patch-palette__empty patch-text-muted" hidden>
            No macros found
          </p>
        </div>

        <footer class="patch-palette-footer">
          <div class="patch-palette-footer__record">
            <input
              id="intent-input"
              type="text"
              class="patch-palette__intent"
              placeholder="Describe what to record…"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="record-btn" type="button" class="patch-btn patch-btn--sm patch-btn--primary">
              Record
            </button>
          </div>
          <div class="patch-palette-footer__actions">
            <button id="capture-btn" type="button" class="patch-btn patch-btn--sm">Capture DOM</button>
            <button id="generate-btn" type="button" class="patch-btn patch-btn--sm">Generate</button>
            <button id="cancel-record-btn" type="button" class="patch-btn patch-btn--sm" hidden>
              Cancel recording
            </button>
            <button type="button" id="options-link" class="patch-btn patch-btn--sm patch-btn--ghost">
              Manage macros
            </button>
          </div>
        </footer>
      </div>

      <p id="status" class="patch-status" role="status" aria-live="polite"></p>

      <section id="review-panel" class="patch-section" hidden>
        <h2 class="patch-section__title">Review</h2>
        <p id="review-summary" class="patch-text-muted"></p>
        <ol id="review-steps" class="patch-list"></ol>
        <pre id="review-script-json" class="patch-code" hidden></pre>
        <div class="patch-row">
          <button id="confirm-save-btn" type="button" class="patch-btn patch-btn--primary">
            Save
          </button>
          <button id="discard-btn" type="button" class="patch-btn">Discard</button>
        </div>
      </section>

      <pre id="capture-output" class="patch-code" hidden></pre>
    </main>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
