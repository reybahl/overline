<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overline</title>
  </head>
  <body>
    <script>
      if (new URLSearchParams(location.search).has("runMacro")) {
        document.documentElement.classList.add("ol-param-only");
      }
    </script>
    <main class="ui-shell ui-shell--palette">
      <div id="palette-panel" class="ui-palette">
        <div class="ui-palette__search-wrap">
          <input
            id="search-input"
            type="search"
            class="ui-palette__search"
            placeholder="Search macros…"
            autocomplete="off"
            spellcheck="false"
            aria-controls="macro-list"
            aria-autocomplete="list"
          />
        </div>

        <div class="ui-palette__list-wrap">
          <ul id="macro-list" class="ui-palette__list" role="listbox" aria-label="Macros"></ul>
          <p id="macro-empty" class="ui-palette__empty ui-text-muted" hidden>
            No macros found
          </p>
        </div>

        <footer class="ui-palette-footer">
          <div class="ui-palette-footer__bar">
            <div class="ui-palette-footer__leading">
              <button
                id="capture-btn"
                type="button"
                class="ui-btn ui-btn--icon"
                title="Capture DOM"
                aria-label="Capture DOM"
              ></button>
              <button id="cancel-record-btn" type="button" class="ui-btn ui-btn--sm" hidden>
                Cancel recording
              </button>
              <button
                type="button"
                id="options-link"
                class="ui-btn ui-btn--icon"
                title="Manage macros"
                aria-label="Manage macros"
              ></button>
            </div>
            <input
              id="intent-input"
              type="text"
              class="ui-palette__intent"
              placeholder="Describe what to record…"
              autocomplete="off"
              spellcheck="false"
              hidden
            />
            <button
              id="generate-btn"
              type="button"
              class="ui-btn ui-btn--icon ui-btn--primary"
              title="Generate"
              aria-label="Generate"
            ></button>
          </div>
        </footer>
      </div>

      <p id="status" class="ui-status" role="status" aria-live="polite"></p>

      <section id="review-panel" class="ui-section" hidden>
        <h2 class="ui-section__title">Review</h2>
        <p id="review-summary" class="ui-text-muted"></p>
        <ol id="review-steps" class="ui-list"></ol>
        <pre id="review-script-json" class="ui-code" hidden></pre>
        <div class="ui-section__actions">
          <button id="discard-btn" type="button" class="ui-btn">Discard</button>
          <button id="confirm-save-btn" type="button" class="ui-btn ui-btn--primary">
            Save
          </button>
        </div>
      </section>

      <pre id="capture-output" class="ui-code" hidden></pre>

      <div id="macro-settings-root"></div>

      <dialog id="param-prompt" class="ui-param-prompt">
        <form id="param-prompt-form" class="ui-param-prompt__form" method="dialog">
          <h2 id="param-prompt-title" class="ui-param-prompt__title"></h2>
          <div id="param-prompt-fields" class="ui-param-prompt__fields"></div>
          <p id="param-prompt-error" class="ui-param-prompt__error" hidden></p>
          <div class="ui-param-prompt__actions">
            <button id="param-prompt-cancel" type="button" class="ui-btn">
              Cancel
            </button>
            <button type="submit" class="ui-btn ui-btn--primary">Run</button>
          </div>
        </form>
      </dialog>
    </main>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
